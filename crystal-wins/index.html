<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3B Pot — Crystal Wins</title>
    <link rel="icon" type="image/png" href="/shared/assets/logo_3b.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Exo+2:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/slot.css">
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="bg__photo"></div>
        <div class="bg__vignette"></div>
        <div class="bg__glow bg__glow--a"></div>
        <div class="bg__glow bg__glow--b"></div>
        <div class="bg__noise"></div>
    </div>

    <div class="stage">
        <header class="topbar">
            <a class="topbar__back" id="backLink" href="/inicio/">← Juegos</a>
            <div class="topbar__meta">
                <span class="topbar__chip">Máq. <strong id="machineNum">—</strong></span>
                <span class="topbar__chip topbar__chip--balance">Saldo <strong id="balance">$0</strong></span>
            </div>
        </header>

        <main class="machine">
            <h1 class="logo">
                <span class="logo__text">Crystal Wins</span>
            </h1>

            <div class="machine__row">
                <div class="cabinet">
                    <div class="cabinet__perspective">
                        <div class="cabinet__bezel">
                            <div class="cabinet__frame" aria-hidden="true"></div>
                            <div class="cabinet__inner">
                                <div class="payline-layer" aria-hidden="true">
                                    <span class="pline pline--h0" data-line="0"></span>
                                    <span class="pline pline--h1" data-line="1"></span>
                                    <span class="pline pline--h2" data-line="2"></span>
                                    <span class="pline pline--d0" data-line="3"></span>
                                    <span class="pline pline--d1" data-line="4"></span>
                                </div>
                                <div class="reels" id="reels">
                                    <div class="reel" data-reel="0"><div class="reel__strip"></div></div>
                                    <div class="reel" data-reel="1"><div class="reel__strip"></div></div>
                                    <div class="reel" data-reel="2"><div class="reel__strip"></div></div>
                                </div>
                                <div class="win-flash" id="winFlash" hidden></div>
                            </div>
                        </div>
                        <div class="cabinet__base" aria-hidden="true"></div>
                    </div>
                </div>

                <aside class="controls">
                    <button type="button" class="ctrl" id="autoBtn" title="Auto">
                        <svg class="ctrl__svg" viewBox="0 0 40 40" aria-hidden="true">
                            <circle cx="20" cy="20" r="15" fill="none" stroke="currentColor" stroke-width="2.2"/>
                            <path fill="currentColor" d="M20 7v6l5-3-5-3zm-8.5 6.2 4.2 4.2-3 1.2-1.2-5.4z"/>
                            <text x="20" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="currentColor" font-family="Exo 2,sans-serif">A</text>
                        </svg>
                        <span class="ctrl__label">AUTO</span>
                    </button>

                    <button type="button" class="spin" id="spinBtn" title="Girar" aria-label="Girar">
                        <span class="spin__outer"></span>
                        <span class="spin__mid"></span>
                        <span class="spin__face">
                            <svg viewBox="0 0 64 64" width="44" height="44" aria-hidden="true">
                                <path fill="#fff" d="M32 8c-9.4 0-17.5 5.4-21.3 13.2l5.8 2.4A17.9 17.9 0 0 1 32 14c9.9 0 18 8.1 18 18s-8.1 18-18 18c-7.4 0-13.8-4.5-16.6-10.9l-5.9 2.2C13.2 50.6 21.9 56 32 56c13.3 0 24-10.7 24-24S45.3 8 32 8zm-2 0v10l9-5-9-5z"/>
                            </svg>
                        </span>
                    </button>

                    <button type="button" class="ctrl" id="turboBtn" title="Turbo">
                        <svg class="ctrl__svg" viewBox="0 0 40 40" aria-hidden="true">
                            <path fill="currentColor" d="M22 4 10 22h8l-2 14 14-20h-8l2-12z"/>
                        </svg>
                        <span class="ctrl__label" id="turboLabel">OFF</span>
                    </button>
                </aside>
            </div>

            <div class="hud">
                <div class="hud__bet">
                    <button type="button" class="hud__adj" id="betMinus" aria-label="Bajar">−</button>
                    <div class="hud__screen">
                        <span id="betDisplay">10</span>
                    </div>
                    <button type="button" class="hud__adj" id="betPlus" aria-label="Subir">+</button>
                </div>
                <div class="hud__screen hud__screen--win">
                    <span id="winDisplay">0</span>
                </div>
                <div class="hud__lines">5 LINES</div>
            </div>

            <p class="status" id="hint"></p>
        </main>
    </div>

    <div class="toast" id="toast" hidden><span id="toastMsg"></span></div>

    <div class="modal" id="modal" hidden>
        <div class="modal__backdrop"></div>
        <div class="modal__card">
            <div class="modal__title" id="modalTitle">¡PREMIO!</div>
            <div class="modal__amount" id="modalAmount">$0</div>
            <button type="button" class="modal__btn" id="modalClose">Continuar</button>
        </div>
    </div>

    <script src="/shared/machine-client.js"></script>
    <script src="/shared/player-auth.js"></script>
    <script src="js/symbols.js"></script>
    <script src="js/slot.js"></script>
</body>
</html>
