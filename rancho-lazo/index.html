<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Rancho Lazo — 3B Pot</title>
  <link rel="icon" type="image/png" href="/shared/assets/logo_3b.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <div class="brand">Rancho Lazo</div>
      <div class="stats">
        <span>Máq. <strong id="machineLabel">—</strong></span>
        <span>Saldo <strong id="credits">$0</strong></span>
        <span>Apuesta <strong id="bet">$5</strong></span>
        <span>Premio <strong id="win">$0</strong></span>
      </div>
    </header>

    <div class="paytable">
      <span class="pay pig">Cerdo ×0.5</span>
      <span class="pay cow">Vaca ×1.5</span>
      <span class="pay bull">Toro ×8</span>
    </div>

    <canvas id="game" width="960" height="540" aria-label="Rancho Lazo"></canvas>

    <div class="mobile-actions" aria-label="Controles táctiles">
      <a class="mobile-btn menu" id="menuBtn" href="/inicio/" data-inicio-link>← Menú</a>
      <button type="button" id="actionBtn" class="mobile-btn action">JUGAR</button>
    </div>

    <div class="controls">
      <button type="button" id="betDown" class="ctrl">−</button>
      <button type="button" id="betUp" class="ctrl">+</button>
      <button type="button" id="muteBtn" class="ctrl mute">🔊</button>
      <a class="back-link" href="/inicio/" data-inicio-link>← Máquinas</a>
      <p class="hint" id="hint">Saldo de máquina · MXN · Botón LANZAR</p>
    </div>

    <div class="overlay" id="overlay">
      <div class="panel">
        <h1 id="title">Rancho Lazo</h1>
        <p id="subtitle">
          Tragamonedas de lazo en pesos mexicanos (3B Pot).
          Cerdo poco · Vaca más · Toro jackpot. Forcejea tocando rápido.
        </p>
        <div class="panel-actions">
          <a class="btn-link" href="/inicio/" data-inicio-link>Elegir máquina</a>
          <button type="button" id="startBtn">Jugar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/shared/machine-client.js"></script>
  <script src="/shared/player-auth.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js?v=mobilebtns"></script>
</body>
</html>
